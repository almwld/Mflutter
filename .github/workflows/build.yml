name: Mudabbir Android Build
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
      - run: flutter create --platforms=android --org com.mudabbir .
      - run: flutter pub get
      - name: Fix Android config
        run: |
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 26/' android/app/build.gradle.kts
          sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "27.0.12077973"/' android/app/build.gradle.kts
      - name: Create ProGuard rules
        run: |
          cat > android/app/proguard-rules.pro << 'PG'
          -keep class org.tensorflow.lite.** { *; }
          -keep class org.tensorflow.lite.gpu.** { *; }
          -dontwarn org.tensorflow.lite.**
          PG
      - name: Inject ProGuard
        run: |
          python3 -c "
          with open('android/app/build.gradle.kts','r') as f: c = f.read()
          c = c.replace('buildTypes {', '''buildTypes {
          release {
              isMinifyEnabled = true
              isShrinkResources = true
              proguardFiles(
                  getDefaultProguardFile(\"proguard-android-optimize.txt\"),
                  \"proguard-rules.pro\"
              )
          }''')
          with open('android/app/build.gradle.kts','w') as f: f.write(c)
          "
      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi
      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
      - name: Upload x86_64
        uses: actions/upload-artifact@v4
        with:
          name: app-x86_64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
