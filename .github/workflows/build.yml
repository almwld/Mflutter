name: Mudabbir Android Build
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.0"
          channel: stable
      
      - name: Create Android project
        run: flutter create --platforms=android --org com.mudabbir .
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Fix Android config
        run: |
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 26/' android/app/build.gradle.kts
          sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "27.0.12077973"/' android/app/build.gradle.kts
      
      - name: Add ProGuard rules
        run: |
          cat > android/app/proguard-rules.pro << 'EOF'
          -keep class org.tensorflow.lite.** { *; }
          -keep class org.tensorflow.lite.gpu.** { *; }
          -dontwarn org.tensorflow.lite.**
          EOF
      
      - name: Inject ProGuard into build.gradle.kts
        run: python3 -c "
          import re
          with open('android/app/build.gradle.kts','r') as f:
              c = f.read()
          new = '''    buildTypes {
              release {
                  isMinifyEnabled = true
                  isShrinkResources = true
                  proguardFiles(
                      getDefaultProguardFile(\"proguard-android-optimize.txt\"),
                      \"proguard-rules.pro\"
                  )
              }
          }'''
          c = re.sub(r'buildTypes\s*\{[^}]*\}', new, c, flags=re.DOTALL)
          with open('android/app/build.gradle.kts','w') as f:
              f.write(c)
          print('OK')
          "
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mudabbir-apk
          path: build/app/outputs/flutter-apk/app-release.apk
