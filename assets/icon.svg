<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27"/>
      <stop offset="100%" style="stop-color:#1A237E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  <!-- خلفية -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- هلال -->
  <path d="M180 100 Q300 150 300 256 Q300 362 180 412 Q280 380 330 256 Q280 132 180 100Z" fill="url(#gold)" opacity="0.9"/>
  <!-- نجمة -->
  <polygon points="256,140 268,180 310,180 274,204 288,244 256,220 224,244 238,204 202,180 244,180" fill="url(#gold)"/>
  <!-- كتاب -->
  <path d="M340 180 L460 180 L460 380 L340 380Z" fill="#1A237E" stroke="url(#gold)" stroke-width="4" rx="10"/>
  <!-- حروف عربية -->
  <text x="400" y="300" font-family="serif" font-size="60" fill="url(#gold)" text-anchor="middle" font-weight="bold">مدبر</text>
</svg>
