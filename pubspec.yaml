name: mudabbir_al_asrar
description: مُدَبِّر الْأَسْرَارِ الْعُلْيَا - نظام قرآني متكامل مع Python AI
version: 1.0.0+70
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.2.0
  google_fonts: ^6.1.0
  encrypt: ^5.0.3
  path_provider: ^2.1.2
  sqflite: ^2.3.2
  tflite_flutter: ^0.10.4
  flutter_launcher_icons: ^0.13.1
  sensors_plus: ^4.0.2
  vibration: ^1.9.0
  python_ffi: ^0.3.1
  ffi: ^2.1.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/quran_full.json
    - assets/python/
    - assets/python/numpy/
    - assets/models/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
